name: Build Test and ECR Push

# This should be the final version
# Auto run only needed when push to main, or PR to main, otherwise pipeline can be triggered manually
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

  workflow_dispatch:

env:
    GIT_HASH: $(git rev-parse --short "$GITHUB_SHA")
    GIT_BRANCH: ${GITHUB_REF#refs/heads/}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v4

      # Runs a single command using the runners shell
      - name: Run a one-line script
        run: echo Hello, world!

      # Runs a set of commands using the runners shell
      - name: Run a multi-line script
        run: |
          echo current hash: ${{ env.GIT_HASH }}
          echo on branch:  ${{ env.GIT_BRANCH }}

  # Test and linter can run in parallel
  test: 
    
    runs-on: ubuntu-latest
    # When this line added both to "test" and "lint" job, they should run in paralel
    needs: build

    
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v4

      - name: Simple test
        run: echo Hello tester!

  lint: 
    runs-on: ubuntu-latest
    
    # When this line added both to "test" and "lint" job, they should run in paralel
    needs: build
    
    steps:
      - uses: actions/checkout@v4

      - name: Simple test
        run: echo Hello linter!
  push:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - name: Push to ECR
        run: echo Hello push to ECR!
    